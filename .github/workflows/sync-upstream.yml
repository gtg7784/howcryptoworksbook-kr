name: Sync Upstream Translation

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no changes detected'
        type: boolean
        default: false

jobs:
  sync-translation:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream translations
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are an automated upstream sync agent for the Korean translation of "How Crypto Actually Works".
            Your job: detect upstream changes → translate changed files → create auto-merged PR.

            Force sync: ${{ inputs.force || 'false' }}

            ## Step 1: Check for upstream changes

            Read `.github/sync-state.json` to get `last_synced_sha`.
            Then get current upstream HEAD:
            ```
            gh api repos/lawmaster10/howcryptoworksbook/commits/master --jq '.sha'
            ```

            If HEAD == last_synced_sha AND force is not true: print "No upstream changes" and STOP.

            ## Step 2: Get changed files

            ```
            gh api "repos/lawmaster10/howcryptoworksbook/compare/{last_synced_sha}...{head_sha}" --jq '.files[] | {filename, status}'
            ```

            Filter to `.md` files only. SKIP `readme.md` and `CONTRIBUTING.md` (customized in KR repo).

            ## Step 3: Translate each changed file

            Read the translation guidelines from `CLAUDE.md` — follow them STRICTLY.

            For each changed file:
            a) Fetch NEW English content:
            ```
            gh api "repos/lawmaster10/howcryptoworksbook/contents/{filepath}?ref=master" --jq '.content' | base64 -d
            ```
            b) Read CURRENT Korean translation from this repo (if exists).
            c) If file is NEW: translate entire English file to Korean.
            d) If file EXISTS: compare English changes and apply equivalent updates to Korean translation.
               - Keep ALL unchanged Korean text EXACTLY as-is
               - Only modify sections that changed in English

            ## Step 4: Create PR and auto-merge

            a) Create branch: `sync/upstream-{head_sha_first_7}`
            b) Stage and commit translations: `번역 동기화: upstream {head_sha_first_7}`
            c) Update `.github/sync-state.json` with new SHA and timestamp. Commit: `chore: update sync state to {head_sha_first_7}`
            d) Push branch, create PR:
               - Title: `[자동번역] Upstream 동기화: {short description}`
               - Body: list of upstream commits (with links), translated files, skipped files
               - Footer: "⚡ 이 PR은 Claude에 의해 자동 생성되었습니다."
               - Label: `auto-translation` (create if needed)
            e) Auto-merge: `gh pr merge --squash --delete-branch`

            ## Rules
            - If a file was DELETED upstream, do NOT delete locally. Mention in PR body.
            - NEVER modify readme.md or CONTRIBUTING.md.
            - If translation of any file fails, still create PR with successes, note failures, do NOT auto-merge.
            - Always create PR first (traceability), then auto-merge.
          claude_args: |
            --max-turns 50
            --allowedTools "Read,Write,Edit,Bash(gh:*),Bash(git:*),Bash(curl:*),Bash(base64:*),Bash(jq:*),Bash(cat:*),Bash(echo:*),Bash(python3:*)"
